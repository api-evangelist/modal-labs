specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Modal
providerId: modal-labs
created: '2026-07-01'
modified: '2026-07-01'
reconciled: true
tags:
- Serverless
- Compute
- GPU
- AI Infrastructure
- Plans
description: >-
  Modal combines named subscription tiers (Starter, Team, Enterprise) with
  granular, usage-based, per-second compute billing. Every tier is billed as
  "plan fee + compute", where compute is metered per second for CPU cores,
  memory (GiB), and GPU time, plus per-GiB-month for Volume storage. Free
  monthly credits offset compute on the Starter and Team tiers. There is no
  per-request/API-call price because Modal bills the underlying container
  resources, not HTTP calls.
notes: >-
  Per-second GPU, CPU, and memory rates and tier limits as published on the
  Modal pricing page; verify current rates and the full GPU catalog on the
  page. CPU has a 0.125-core minimum; Volumes include 1 TiB free.
sources:
- https://modal.com/pricing
- https://modal.com/docs/guide/gpu
plans:
- id: modal-starter
  name: Starter
  type: subscription
  description: >-
    Entry tier at $0/month plan fee plus compute, with $30/month of free
    compute credits, up to 3 workspace seats, 100 concurrent containers, and
    10 concurrent GPUs.
  entries:
  - label: Plan Fee
    name: starter_plan_fee
    type: flat
    metric: subscription
    limit: -1
    timeFrame: month
    geo: global
    unit: 1
    price: $0 + compute per month
    userMultiplied: false
  - label: Included Compute Credits
    name: starter_credits
    type: usage
    metric: credits
    limit: -1
    timeFrame: month
    geo: global
    unit: 1
    price: $30/month free credits
    userMultiplied: false
  elements:
  - name: Up to 3 workspace seats
  - name: 100 concurrent containers
  - name: 10 concurrent GPUs
- id: modal-team
  name: Team
  type: subscription
  description: >-
    $250/month plan fee plus compute, with $100/month of free compute
    credits, unlimited seats, 1,000 concurrent containers, and 50 concurrent
    GPUs.
  entries:
  - label: Plan Fee
    name: team_plan_fee
    type: flat
    metric: subscription
    limit: -1
    timeFrame: month
    geo: global
    unit: 1
    price: $250 + compute per month
    userMultiplied: false
  - label: Included Compute Credits
    name: team_credits
    type: usage
    metric: credits
    limit: -1
    timeFrame: month
    geo: global
    unit: 1
    price: $100/month free credits
    userMultiplied: false
  elements:
  - name: Unlimited seats
  - name: 1,000 concurrent containers
  - name: 50 concurrent GPUs
- id: modal-enterprise
  name: Enterprise
  type: enterprise
  description: >-
    Custom pricing with volume-based discounts, unlimited seats, higher GPU
    concurrency, and negotiated terms. Contact Modal sales.
  entries:
  - label: Enterprise Agreement
    name: enterprise
    type: flat
    metric: contract
    limit: -1
    timeFrame: year
    geo: global
    unit: 1
    price: custom / contact sales
    userMultiplied: false
  elements:
  - name: Volume-based discounts
  - name: Unlimited seats
  - name: Higher GPU concurrency
- id: modal-usage-compute
  name: Usage-Based Compute
  type: usage
  description: >-
